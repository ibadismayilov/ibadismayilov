<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F1F5F9" />
    </linearGradient>
    <linearGradient id="accent-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <linearGradient id="ascii-grad-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <!-- Filters -->
    <filter id="glow-light" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="blur-bg-light">
      <feGaussianBlur stdDeviation="25" />
    </filter>

    <!-- Styles -->
    <style>
      .font-mono { font-family: 'Fira Code', 'Courier New', monospace; }
      .font-sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif; }
      .cursor { animation: blink 1s infinite; }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      .floating { animation: float 6s ease-in-out infinite; }
      @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
      .pill:hover { filter: url(#glow-light); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1180" height="610" fill="url(#bg-grad-light)" rx="16" />

  <!-- Subtle Radial Glow Background -->
  <circle cx="200" cy="200" r="160" fill="#2563EB" opacity="0.06" filter="url(#blur-bg-light)" />
  <circle cx="900" cy="450" r="180" fill="#06B6D4" opacity="0.05" filter="url(#blur-bg-light)" />

  <!-- LEFT SECTION: ASCII Portrait -->
  <g class="floating" transform="translate(40, 0)">
    <rect x="30" y="80" width="380" height="440" fill="url(#ascii-grad-light)" opacity="0.02" filter="url(#blur-bg-light)" rx="12"/>
    <g fill="url(#ascii-grad-light)" class="font-mono" font-size="11" font-weight="bold" opacity="0.85">
      <text x="50" y="120">0101   .::::::.   10101101</text>
      <text x="50" y="140">110  .::::::::::.  1011010</text>
      <text x="50" y="160">00  .::`  `::`  `::.  0101</text>
      <text x="50" y="180">11  :::    ::    :::  1011</text>
      <text x="50" y="200">01  :::[IBAD ISMAYILOV]:: 01</text>
      <text x="50" y="220">10  :::    ::    :::  1010</text>
      <text x="50" y="240">11  `::.  .::.  .::`  1101</text>
      <text x="50" y="260">001  `::::::::::`  10110</text>
      <text x="50" y="280">1010   `::::::`   01011001</text>
      <text x="50" y="310" fill="#2563EB" font-size="13">&gt; CORE_ENG_LOADED: 100%</text>
      <text x="50" y="335" fill="#10B981" font-size="13">&gt; SYS_STATUS: SECURE</text>
      <path d="M50 370 H 380" stroke="url(#ascii-grad-light)" stroke-width="1" opacity="0.2" stroke-dasharray="5 5"/>
      <text x="50" y="400" font-size="10" opacity="0.6">IP: 127.0.0.1 // LOC: AZERBAIJAN</text>
      <text x="50" y="420" font-size="10" opacity="0.6">HOST: AzTU_ROBOTICS_LAB_05</text>
    </g>
  </g>

