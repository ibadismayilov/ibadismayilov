        <g transform="translate(50, 20)" class="pill"><circle cx="15" cy="15" r="18" fill="#E2E8F0"/><path d="M9 10H12V20H9V10ZM10.5 5C11.3 5 12 5.7 12 6.5C12 7.3 11.3 8 10.5 8C9.7 8 9 7.3 9 6.5C9 5.7 9.7 5 10.5 5ZM14 10H17V11.5H17.1C17.5 10.8 18.4 10 19.8 10C22.6 10 23 11.8 23 14.2V20H20V15.5C20 14.4 19.8 13 18.3 13C16.8 13 16.5 14.2 16.5 15.4V20H13.5V10H14Z" fill="#0077B5"/></g>
