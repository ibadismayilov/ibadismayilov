      <g transform="translate(0, 240)">
        <text x="0" y="0" fill="#0F172A" class="font-sans" font-size="16" font-weight="bold">Tech Stack &amp; Tools</text>
        <g transform="translate(0, 15)" class="font-mono" font-size="12" fill="#0F172A">
          <g class="pill"><rect width="85" height="28" fill="#E2E8F0" rx="6"/><text x="42" y="18" text-anchor="middle" fill="#6D28D9">.NET Core</text></g>
          <g class="pill" transform="translate(95,0)"><rect width="70" height="28" fill="#E2E8F0" rx="6"/><text x="35" y="18" text-anchor="middle" fill="#0891B2">React</text></g>
          <g class="pill" transform="translate(175,0)"><rect width="95" height="28" fill="#E2E8F0" rx="6"/><text x="47" y="18" text-anchor="middle" fill="#0284C7">TypeScript</text></g>
          <g class="pill" transform="translate(280,0)"><rect width="80" height="28" fill="#E2E8F0" rx="6"/><text x="40" y="18" text-anchor="middle" fill="#16A34A">Node.js</text></g>
          <g class="pill" transform="translate(370,0)"><rect width="95" height="28" fill="#E2E8F0" rx="6"/><text x="47" y="18" text-anchor="middle" fill="#2563EB">PostgreSQL</text></g>
